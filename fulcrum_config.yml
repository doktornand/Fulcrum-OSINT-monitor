# =============================================================================
# FULCRUM CONFIGURATION — Full Spectrum Intelligence Platform
# =============================================================================
# Ce fichier fusionne toutes les sources des trois outils :
#   - Wonitor (Cyber sécurité, CVEs, Exploits)
#   - StratWatch (Défense, Nucléaire, Aérospatiale, Géopolitique)
#   - LeakHunter (Data Leaks, Breaches, Ransomware)
# =============================================================================

app:
  name: "FULCRUM Intelligence Platform"
  version: "3.0"
  description: "Full Spectrum Intelligence Fusion Center — Cyber · Strategic · Offensive"
  theme: "ops"
  timezone: "UTC"
  debug: false
  user_agent: "FULCRUM/3.0 (Intelligence Platform; +https://github.com/fulcrum)"

collection:
  max_items_per_feed: 25
  request_timeout: 15
  retry_attempts: 3
  retry_backoff: 1.5
  concurrent_workers: 10
  rate_limit_per_host: 2
  user_agent_rotation: true
  proxy_rotation: false
  deduplicate: true
  scraping_enabled: true
  leak_focused_mode: false

cache:
  enabled: true
  type: "memory"  # memory | redis
  redis_url: "redis://localhost:6379/0"
  ttl_seconds: 3600
  memory_max_items: 1000

intelligence:
  scoring:
    risk_weights:
      critical: 40
      exploit: 15
      kev: 15
      ransomware: 12
      apt: 10
      darkweb: 8
    strat_weights:
      nuclear: 25
      conflict: 15
      weapons: 10
      aerospace: 8
      sanctions: 7
      intel: 10

    # Pondération par fiabilité historique de source (0.0 - 1.0)
    source_reliability:
      "CISA KEV Catalog": 1.0
      "NVD National Vuln DB": 1.0
      "ANSSI – Alertes": 1.0
      "CERT-FR – Bulletins": 1.0
      "Krebs on Security": 0.95
      "Cisco Talos": 0.95
      "CrowdStrike Blog": 0.90
      "Mandiant": 0.95
      "Unit42": 0.90
      "Securelist": 0.88
      "RAND Corporation": 0.90
      "ISW — War Updates": 0.85
      "Bellingcat OSINT": 0.85
      "HaveIBeenPwned": 1.0
      "ThreatFox IOCs": 0.88
      "MalwareBazaar": 0.88
      "Exploit-DB": 0.85
      "Project Zero": 0.95
      "AIEA — Actualités": 0.95
      "_default": 0.70

    # Scoring temporel (fraîcheur)
    freshness_bonus_24h: 10    # bonus si article < 24h
    freshness_bonus_72h: 5     # bonus si article < 72h
    freshness_malus_7d: -5     # malus si article > 7j

  thresholds:
    critical_score: 85
    high_score: 70
    medium_score: 50
    flash_threshold: 90
    # Anti-inflation CRITICAL : exige exploit OU acteur étatique confirmé
    critical_requires_exploit_or_actor: true

  # Blacklist anti-faux-positifs contextuels
  false_positive_blacklist:
    - "nuclear family"
    - "atomic clock"
    - "nuclear power plant safety"
    - "nuclear medicine"
    - "bomb squad training"
    - "critical thinking"
    - "critical care"
    - "critical hit"
    - "nuclear pasta"
    - "missile defense spending"
    - "weapons of mass destruction museum"
    - "strategic planning"
    - "crisis management course"
    - "nuclear reactor safety"
    - "defense budget"
    - "ballistic performance"
    - "explosive growth"
    - "nuclear option"
    - "cyber monday"
    - "zero-day sale"

export:
  default_format: "html"
  paths:
    json: "fulcrum_export.json"
    csv: "fulcrum_export.csv"
    html: "fulcrum_dashboard.html"
    pdf: "fulcrum_report.pdf"
  auto_generate: true

alerts:
  webhooks: []
  telegram_bot_token: null
  telegram_chat_id: null
  slack_webhook: null
  discord_webhook: null
  critical_only: false

api:
  enabled: false
  host: "0.0.0.0"
  port: 5000
  cors: true
  api_key: null

# =============================================================================
# NOUVELLES SECTIONS — v3.1
# =============================================================================

# Persistance SQLite
persistence:
  enabled: true
  db_path: "fulcrum.db"
  retention_days: 90       # conservation active
  archive_days: 365        # archivage compressé
  simhash_threshold: 0.85  # seuil similarité fuzzy (SimHash)

# Clés API externes (optionnel)
api_keys:
  acled_key: null          # https://developer.acleddata.com/
  acled_email: null
  # twitter_bearer_token: null  # X/Twitter API v2 (réservé future implémentation)

# Orchestration (APScheduler)
scheduler:
  enabled: false
  collection_interval_minutes: 60
  pruning_interval_hours: 24
  retry_on_failure: true
  max_retry_attempts: 3

# Mode Watch
watch:
  enabled: false
  interval_seconds: 300
  hot_reload_config: true

