# =============================================================================
# FULCRUM CONFIGURATION — Full Spectrum Intelligence Platform
# VERSION 5.0 — Crisis Cell Edition
# =============================================================================
# Fusion complète :
#   - Wonitor      (Cyber sécurité, CVEs, Exploits)
#   - StratWatch   (Défense, Nucléaire, Aérospatiale, Géopolitique)
#   - LeakHunter   (Data Leaks, Breaches, Ransomware)
#
# ÉVOLUTIONS v5.0 (vs v4.0) :
#   + Nouveau profil `crisis_cell` — mode opérationnel cellule de crise
#   + Nouveau profil `oi_watch` — focus Opérateurs d'Importance Vitale
#   + 3 nouvelles catégories :
#       > Maritime - Shipping & Naval Ops  (AIS, FONOPS, détroits, câbles)
#       > Strategic - Hybrid Warfare       (sabotages, GPS spoofing, pipelines)
#       > Strategic - Energy & CI          (énergie, réseaux, eau, transport)
#   + Scoring enrichi : maritime, energy, hybrid, sof
#   + Profil `strat_watch` étendu : SOF, hybride, énergie
#   + Fix doublons : ECFR (x2), AIN Online (canonical_in ambigu)
#   + Feeds à confidence ≤ 5 supprimés des catégories priorité 1
#   + Section `alerts` pré-configurée pour usage opérationnel
#   + Champ `flash_note` sur feeds critiques (description courte)
#   + Paramètre `source_bias` pour transparence éditoriale
# =============================================================================

app:
  name: "FULCRUM Intelligence Platform"
  version: "5.0"
  description: "Full Spectrum Intelligence Fusion Center — Crisis Cell Edition"
  theme: "ops"
  timezone: "UTC"
  debug: false
  user_agent: "FULCRUM/5.0 (Intelligence Platform; +https://github.com/fulcrum)"

collection:
  max_items_per_feed: 25
  request_timeout: 15
  retry_attempts: 3
  retry_backoff: 1.5
  concurrent_workers: 12
  rate_limit_per_host: 2
  user_agent_rotation: true
  proxy_rotation: false
  deduplicate: true
  scraping_enabled: true
  leak_focused_mode: false

cache:
  enabled: true
  type: "memory"  # memory | redis
  redis_url: "redis://localhost:6379/0"
  ttl_seconds: 3600
  memory_max_items: 2000

# =============================================================================
# PROFILS OPÉRATIONNELS — switcher selon la mission
# =============================================================================
profiles:

  cyber_ops:
    description: "Focus cyber offensif et défensif, CVEs, malware, breaches"
    active_categories:
      - "Cyber - Exploits & CVEs"
      - "Cyber - Malware & Threat Intel"
      - "Cyber - News & Analyses"
      - "Offensive - Data Leaks & Breaches"
      - "Offensive - Malware & Ransomware"
      - "Strategic - Cyber Defense & EW"
      - "Cyber-Physical - SCADA & ICS"
    scoring_boost:
      exploit: +5
      ransomware: +5
      scada: +3

  strat_watch:
    description: "Focus géopolitique, défense, nucléaire, conflits, hybride"
    active_categories:
      - "Strategic - Defense & Armament"
      - "Strategic - Nuclear & Proliferation"
      - "Strategic - Aerospace & Air Defense"
      - "Strategic - Intelligence & Special Ops"
      - "Strategic - Geopolitics & IR"
      - "Strategic - Conflicts & Battlefield"
      - "Strategic - Cyber Defense & EW"
      - "Strategic - Hybrid Warfare"
      - "Strategic - Energy & Critical Infrastructure"
      - "Maritime - Shipping & Naval Ops"
    scoring_boost:
      nuclear: +5
      conflict: +5
      hybrid: +4
      maritime: +3

  infowar:
    description: "Focus guerre de l'information, désinformation, influence"
    active_categories:
      - "InfoWar - Disinformation & Influence Ops"
      - "Strategic - Intelligence & Special Ops"
      - "Strategic - Geopolitics & IR"
    scoring_boost:
      disinfo: +10
      influence: +8
      deepfake: +6

  # NOUVEAU v5.0 — profil prioritaire pour l'audience cible
  crisis_cell:
    description: >
      Mode cellule de crise — fusion temps réel des signaux à haute criticité.
      Couvre l'ensemble du spectre avec seuils abaissés pour maximiser la détection
      précoce. Destiné aux gardes opérationnelles et briefings d'urgence.
    active_categories:
      - "Cyber - Exploits & CVEs"
      - "Cyber-Physical - SCADA & ICS"
      - "Strategic - Conflicts & Battlefield"
      - "Strategic - Nuclear & Proliferation"
      - "Strategic - Hybrid Warfare"
      - "Strategic - Energy & Critical Infrastructure"
      - "Maritime - Shipping & Naval Ops"
      - "Strategic - Cyber Defense & EW"
      - "InfoWar - Disinformation & Influence Ops"
      - "OSINT - Geospatial & Satellite Imagery"
    scoring_boost:
      scada: +8
      nuclear: +8
      hybrid: +7
      maritime: +5
      conflict: +5
      disinfo: +4
    flash_threshold_override: 80   # seuil flash abaissé en mode crise

  # NOUVEAU v5.0 — focus Opérateurs d'Importance Vitale
  oi_watch:
    description: >
      Mode OIV/OES — surveillance des menaces pesant sur les infrastructures critiques
      nationales. Énergie, eau, transport, télécoms, défense industrielle.
    active_categories:
      - "Cyber-Physical - SCADA & ICS"
      - "Strategic - Energy & Critical Infrastructure"
      - "Strategic - Hybrid Warfare"
      - "Cyber - Exploits & CVEs"
      - "Strategic - Cyber Defense & EW"
      - "Maritime - Shipping & Naval Ops"
      - "Aviation - Air Traffic & Safety"
    scoring_boost:
      scada: +10
      energy: +10
      ics: +8
      hybrid: +6
      kev: +4

  full_spectrum:
    description: "Toutes catégories actives — mode fusion complète"
    active_categories: "all"

# =============================================================================
# SCORING & SEUILS
# =============================================================================
intelligence:
  scoring:
    risk_weights:
      critical: 40
      exploit: 15
      kev: 15
      ransomware: 12
      apt: 10
      darkweb: 8
      scada: 14        # infrastructure critique
      ics: 14          # systèmes de contrôle industriels
      energy: 12       # NOUVEAU — attaque énergie / réseau
    strat_weights:
      nuclear: 25
      conflict: 15
      weapons: 10
      aerospace: 8
      sanctions: 7
      intel: 10
      arctic: 8
      taiwan: 9
      sahel: 7
      hybrid: 13       # NOUVEAU — guerre hybride (sabotage, spoofing, pipeline)
      maritime: 10     # NOUVEAU — incidents maritimes stratégiques
      sof: 9           # NOUVEAU — opérations spéciales confirmées
      cable: 11        # NOUVEAU — câbles sous-marins / infrastructures critiques
    info_weights:
      disinfo: 12
      influence: 10
      propaganda: 8
      deepfake: 9
    osint_weights:
      satellite: 10
      geoint: 9
      shiptracking: 8  # rehaussé (valeur opérationnelle)
      adsb: 8          # rehaussé
  thresholds:
    critical_score: 85
    high_score: 70
    medium_score: 50
    flash_threshold: 90

export:
  default_format: "html"
  paths:
    json: "fulcrum_export.json"
    csv: "fulcrum_export.csv"
    html: "fulcrum_dashboard.html"
    pdf: "fulcrum_report.pdf"
  auto_generate: true

# =============================================================================
# ALERTES — pré-configuré pour usage opérationnel
# Décommenter et renseigner selon l'infrastructure de la cellule
# =============================================================================
alerts:
  webhooks: []
  # telegram_bot_token: "BOT_TOKEN_HERE"
  # telegram_chat_id: "CHAT_ID_HERE"   # canal chiffré dédié recommandé
  # slack_webhook: "SLACK_WEBHOOK_URL"
  # discord_webhook: "DISCORD_WEBHOOK_URL"
  telegram_bot_token: null
  telegram_chat_id: null
  slack_webhook: null
  discord_webhook: null
  critical_only: false
  # Recommandation opérationnelle :
  #   - critical_only: true  en veille passive (nuit, week-end)
  #   - critical_only: false en garde active
  minimum_score_for_alert: 85
  deduplicate_window_minutes: 30
  flash_prefix: "[⚡ FLASH FULCRUM]"
  critical_prefix: "[🔴 CRITIQUE FULCRUM]"

api:
  enabled: false
  host: "0.0.0.0"
  port: 5000
  cors: true
  api_key: null

# =============================================================================
# CATÉGORIES ET SOURCES
# =============================================================================
# NOTE SUR LES DOUBLONS :
#   Certains feeds apparaissent dans plusieurs catégories par pertinence croisée.
#   Le flag `canonical_in` indique la catégorie de référence pour le scoring.
#   Les occurrences secondaires sont marquées `role: "cross_ref"` et n'incrémentent
#   pas le compteur de déduplication.
#
# NOTE SUR `source_bias` (NOUVEAU v5.0) :
#   Indication de l'orientation éditoriale ou institutionnelle de la source.
#   Valeurs : neutral | us_centric | eu_centric | fr_centric | pro_ukraine |
#             pro_russia | pro_china | ngo | industry | think_tank | official
